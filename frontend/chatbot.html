<!DOCTYPE html>
<html>
<head>
    <title>PrepMate Chatbot</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f5f5f5;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 15px 60px;
            background: white;
        }

        .navbar a {
            margin: 0 10px;
            text-decoration: none;
            color: black;
        }

        /* Chat Container */
        .chat-container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            height: 70vh;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        /* Messages */
        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .user-msg {
            text-align: right;
            margin: 10px;
        }

        .bot-msg {
            text-align: left;
            margin: 10px;
        }

        .bubble {
            display: inline-block;
            padding: 10px 15px;
            border-radius: 10px;
            max-width: 70%;
        }

        .user-msg .bubble {
            background: #2ecc71;
            color: white;
        }

        .bot-msg .bubble {
            background: #ddd;
        }

        /* Input */
        .input-box {
            display: flex;
            border-top: 1px solid #ccc;
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
        }

        button {
            padding: 10px 20px;
            background: #2ecc71;
            border: none;
            color: white;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <b>PrepMate</b>
    <div>
        <a href="chatbot.html">Chatbot</a>
        <a href="repository.html">Interview Questions</a>
        <a href="gd.html">GD Prep</a>
    </div>
</div>

<!-- Chat UI -->
<div class="chat-container">

    <div class="messages" id="messages">
        <div class="bot-msg">
            <div class="bubble">Hello! Ask me any interview question 😊</div>
        </div>
    </div>

    <div class="input-box">
        <input type="text" id="input" placeholder="Type your question...">
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>

</div>
<script>
async function sendMessage() {
    let input = document.getElementById("input");
    let message = input.value.trim();

    if(message === "") {
        input.focus();
        return;
    }

    let sendBtn = document.getElementById("sendBtn");
    sendBtn.disabled = true;

    let messages = document.getElementById("messages");

    // Show user message
    let userDiv = document.createElement("div");
    userDiv.className = "user-msg";
    userDiv.innerHTML = `<div class="bubble">${message}</div>`;
    messages.appendChild(userDiv);

    input.value = "";

    // Typing indicator
    let typingDiv = document.createElement("div");
    typingDiv.className = "bot-msg";
    typingDiv.id = "typing";
    typingDiv.innerHTML = `<div class="bubble">Typing...</div>`;
    messages.appendChild(typingDiv);

    try {
        let response = await fetch("http://127.0.0.1:5002/chat", {

            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message: message })
        });

        let data = await response.json();

        // Remove typing safely
        let typing = document.getElementById("typing");
        if (typing) typing.remove();

        let botDiv = document.createElement("div");
        botDiv.className = "bot-msg";

        let formattedReply = data.reply.replace(/\n/g, "<br><br>");
        botDiv.innerHTML = `<div class="bubble">${formattedReply}</div>`;
        messages.appendChild(botDiv);

    } catch (error) {
        let typing = document.getElementById("typing");
        if (typing) typing.remove();

        let botDiv = document.createElement("div");
        botDiv.className = "bot-msg";
        botDiv.innerHTML = `<div class="bubble">Error connecting to server</div>`;
        messages.appendChild(botDiv);
    }

    sendBtn.disabled = false;
    input.focus();
    messages.scrollTop = messages.scrollHeight;
}

// Enter key support
document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter" && !document.getElementById("sendBtn").disabled) {
        e.preventDefault();
        sendMessage();
    }
});
</script>

</body>
</html>
