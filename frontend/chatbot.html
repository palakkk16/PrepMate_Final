<!DOCTYPE html>
<html>
<head>
    <title>PrepMate Chatbot</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            height: 100vh;
            background: #f0f2f5;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: #1e293b;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .new-chat {
            padding: 12px;
            background: #3b82f6;
            border: none;
            color: white;
            border-radius: 8px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .chat-list {
            flex: 1;
        }

        .chat-item {
            padding: 10px;
            background: #334155;
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        /* Main */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            padding: 18px 30px;
            background: white;
            border-bottom: 1px solid #ddd;
            font-weight: bold;
        }

        .messages {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .user-msg, .bot-msg {
            margin: 12px 0;
        }

        .bubble {
            display: inline-block;
            padding: 14px 18px;
            border-radius: 14px;
            max-width: 65%;
        }

        .user-msg {
            text-align: right;
        }

        .user-msg .bubble {
            background: #3b82f6;
            color: white;
        }

        .bot-msg .bubble {
            background: #e5e7eb;
        }

        .input-box {
            display: flex;
            padding: 15px;
            background: white;
            border-top: 1px solid #ddd;
        }

        input {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        button {
            margin-left: 10px;
            padding: 15px;
            background: #3b82f6;
            border: none;
            color: white;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <button class="new-chat" onclick="newChat()">+ Start New Chat</button>

    <div class="chat-list" id="chatList"></div>
</div>

<!-- Main -->
<div class="main">

    <div class="navbar">PrepMate Chatbot</div>

    <div class="messages" id="messages"></div>

    <div class="input-box">
        <input type="text" id="input" placeholder="Ask anything...">
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>

</div>

<script>

let currentChatId = null;

function newChat() {
    document.getElementById("messages").innerHTML = "";
    currentChatId = null;
}

async function sendMessage() {
    let input = document.getElementById("input");
    let message = input.value.trim();

    if (message === "") return;

    let sendBtn = document.getElementById("sendBtn");
    sendBtn.disabled = true;

    let messages = document.getElementById("messages");

    // Show user message
    let userDiv = document.createElement("div");
    userDiv.className = "user-msg";
    userDiv.innerHTML = `<div class="bubble">${message}</div>`;
    messages.appendChild(userDiv);

    input.value = "";

    // Typing indicator
    let typingDiv = document.createElement("div");
    typingDiv.className = "bot-msg";
    typingDiv.id = "typing";
    typingDiv.innerHTML = `<div class="bubble">Typing...</div>`;
    messages.appendChild(typingDiv);

    try {
        let response = await fetch("http://127.0.0.1:5002/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: message,
                chat_id: currentChatId
            })
        });

        let data = await response.json();

        // Set chat id
        let isNewChat = currentChatId === null;
        currentChatId = data.chat_id;

        // Add to sidebar ONLY once (first message)
        if (isNewChat) {
            let chatList = document.getElementById("chatList");

            let item = document.createElement("div");
            item.className = "chat-item";
            item.innerText = message.substring(0, 25);

            chatList.appendChild(item);
        }

        // Remove typing
        document.getElementById("typing").remove();

        // Show bot reply
        let botDiv = document.createElement("div");
        botDiv.className = "bot-msg";

        let formattedReply = data.reply.replace(/\n/g, "<br><br>");
        botDiv.innerHTML = `<div class="bubble">${formattedReply}</div>`;
        messages.appendChild(botDiv);

    } catch {
        document.getElementById("typing").remove();

        let botDiv = document.createElement("div");
        botDiv.className = "bot-msg";
        botDiv.innerHTML = `<div class="bubble">Error connecting</div>`;
        messages.appendChild(botDiv);
    }

    sendBtn.disabled = false;
    messages.scrollTop = messages.scrollHeight;
}

// Enter key
document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter" && !document.getElementById("sendBtn").disabled) {
        e.preventDefault();
        sendMessage();
    }
});

</script>

</body>
</html>
