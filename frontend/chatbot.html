<!DOCTYPE html>
<html>
<head>
    <title>PrepMate Chatbot</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #020617;
            color: white;
            display: flex;
            height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            background: #020617;
            border-right: 1px solid rgba(255,255,255,0.08);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            color: #3b82f6;
            text-decoration: none;
            margin-bottom: 20px;
        }

        .new-chat {
            padding: 10px;
            background: #3b82f6;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .new-chat:hover {
            background: #2563eb;
        }


        /* MAIN CHAT */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* NAVBAR */
        .topbar {
            padding: 18px 25px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            font-size: 18px;
            font-weight: 500;

            width: 100%; /* 🔥 ensures full width */
            box-sizing: border-box;
        }

        /* CHAT AREA */
        .chat-box {
            flex: 1;
            padding: 25px;
            overflow-y: auto;

            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 65%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
        }

        .user {
            background: #3b82f6;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        /* BOT (left side) */
        .bot {
            background: #1f2937;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        /* INPUT */
        .input-area {
            padding: 16px;
            border-top: 1px solid rgba(255,255,255,0.08);
            display: flex;
            gap: 10px;
            background: #020617;
        }

        input {
            flex: 1;
            padding: 14px 16px;
            border-radius: 10px;
            border: none;
            background: #1f2937;
            color: white;
        }
        input::placeholder {
            color: #9ca3af;
        }

        input:focus {
            outline: 1px solid #3b82f6;
        }

        button {
            padding: 14px 20px;
            background: #3b82f6;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background: #2563eb;
        }

        .typing::after {
            content: "...";
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0% { content: "."; }
            33% { content: ".."; }
            66% { content: "..."; }
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <a href="index.html" class="logo">PrepMate</a>

    <div class="new-chat" onclick="newChat()">+ New Chat</div>


</div>

<!-- MAIN -->
<div class="main">

    <div class="topbar">
        AI Interview Assistant
    </div>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask something...">
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>
function sendMessage() {
    let input = document.getElementById("userInput");
    let message = input.value.trim();

    if (!message) return;

    let chatBox = document.getElementById("chatBox");

    // USER MESSAGE
    let userMsg = document.createElement("div");
    userMsg.className = "message user";
    userMsg.innerText = message;
    chatBox.appendChild(userMsg);

    // BOT MESSAGE (only ONE created)
    let botMsg = document.createElement("div");
    botMsg.className = "message bot";
    botMsg.innerHTML = "<span class='typing'>Thinking</span>";
    chatBox.appendChild(botMsg);

    chatBox.scrollTop = chatBox.scrollHeight;

    fetch("http://127.0.0.1:5002/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message })
    })
    .then(res => res.json())
    .then(data => {
        // 🔥 IMPORTANT: replace text, NOT append
        botMsg.innerText = data.reply;
        chatBox.scrollTop = chatBox.scrollHeight;
    })
    .catch(() => {
        botMsg.innerText = "Error connecting to server";
    });

    input.value = "";
}

function newChat() {
    document.getElementById("chatBox").innerHTML = "";
}
</script>

</body>
</html>
