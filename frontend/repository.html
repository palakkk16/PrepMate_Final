<!DOCTYPE html>
<html>
<head>
    <title>Interview Questions - PrepMate</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #020617;
            color: white;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #3b82f6;
            text-decoration: none;
        }

        .user-info {
            color: #9ca3af;
        }

        /* SEARCH */
        .search-filter {
            padding: 30px 60px;
        }

        .search-container {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .search-box {
            position: relative;
            flex: 1;
            min-width: 300px;
        }

        .search-box input {
            width: 100%;
            padding: 14px 18px 14px 45px;
            border-radius: 10px;
            border: none;
            background: #111827;
            color: white;
        }

        .search-box input:focus {
            outline: 1px solid #3b82f6;
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }

        /* FILTERS */
        .filters {
            display: flex;
            gap: 10px;
        }

        .filter-btn {
            padding: 10px 16px;
            background: #111827;
            color: #9ca3af;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .filter-btn.active,
        .filter-btn:hover {
            background: #3b82f6;
            color: white;
        }

        /* GRID */
        .topics-grid {
            padding: 20px 60px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        /* CARD */
        .topic-card {
            background: #111827;
            border-radius: 12px;
            transition: 0.3s;
            cursor: pointer;
        }

        .topic-card:hover {
            transform: translateY(-5px);
            background: #1f2937;
        }

        .topic-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .topic-title {
            font-size: 18px;
            font-weight: bold;
        }

        .question-count {
            font-size: 13px;
            color: #9ca3af;
        }

        .questions-list {
            padding: 15px;
        }

        .question-item {
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
        }

        .question-item:hover {
            background: #1f2937;
        }

        .easy { color: #22c55e; }
        .medium { color: #f59e0b; }
        .hard { color: #ef4444; }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
        }

        .modal-content {
            background: #111827;
            color: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 600px;
            margin: 100px auto;
        }
    </style>
</head>

<body>

<div class="navbar">
    <a href="index.html" class="logo">PrepMate</a>
    <div class="user-info">Welcome back!</div>
</div>

<div class="search-filter">
    <div class="search-container">

        <div class="search-box">
            <i class="fas fa-search search-icon"></i>
            <input type="text" placeholder="Search questions...">
        </div>

        <div class="filters">
            <button class="filter-btn active">All</button>
            <button class="filter-btn">DSA</button>
            <button class="filter-btn">OS</button>
            <button class="filter-btn">DBMS</button>
            <button class="filter-btn">SQL</button>
            <button class="filter-btn">OOP</button>
        </div>

    </div>
</div>

<div class="topics-grid">

    <div class="topic-card">
        <div class="topic-header">
            <div class="topic-title">DBMS</div>
            <div class="question-count">2 Questions</div>
        </div>

        <div class="questions-list">
            <div class="question-item">
                <span>What is a primary key?</span>
                <span class="easy">Easy</span>
            </div>

            <div class="question-item">
                <span>What is SQL?</span>
                <span class="easy">Easy</span>
            </div>
        </div>
    </div>

    <div class="topic-card">
        <div class="topic-header">
            <div class="topic-title">OOP</div>
            <div class="question-count">2 Questions</div>
        </div>

        <div class="questions-list">
            <div class="question-item">
                <span>What is encapsulation?</span>
                <span class="medium">Medium</span>
            </div>

            <div class="question-item">
                <span>What is polymorphism?</span>
                <span class="medium">Medium</span>
            </div>
        </div>
    </div>

</div>

</body>
</html>
