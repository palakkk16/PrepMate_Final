<!DOCTYPE html>
<html>
<head>
    <title>PrepMate</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 15px 40px;
            background: white;
            border-bottom: 1px solid #ddd;
        }

        .navbar a {
            margin: 0 10px;
            text-decoration: none;
            color: black;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(to right, #2c3e50, #2ecc71);
            color: white;
            text-align: center;
            padding: 60px;
        }

        .hero button {
            padding: 10px 20px;
            background: #2ecc71;
            border: none;
            color: white;
            border-radius: 5px;
        }

        /* Cards */
        .cards {
            display: flex;
            justify-content: center;
            margin: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 10px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        /* Login Section */
        .login-section {
            display: flex;
            margin: 40px;
        }

        .login-box {
            padding: 40px;
        }

        input {
            display: block;
            margin: 10px 0;
            padding: 10px;
            width: 250px;
        }

        button {
            padding: 10px;
            background: blue;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div><b>PrepMate</b></div>
    <div>
        <a href="#">DSA</a>
        <a href="#">Core</a>
        <a href="#">Programming</a>
        <a href="#">Aptitude</a>
        <a href="#">Interview</a>
        <button>Log in</button>
        <button>Sign up</button>
    </div>
</div>

<!-- Hero -->
<div class="hero">
    <h1>Crack Your Dream Placement 🚀</h1>
    <p>Prepare DSA, Core Subjects & Interviews — All in One Place</p>
    <button>Get Started</button>
</div>

<!-- Cards -->
<div class="cards">
    <div class="card">
        <h3>Structured Learning</h3>
        <p>Step-by-step preparation</p>
    </div>

    <div class="card">
        <h3>Interview Prep</h3>
        <p>Real interview questions</p>
    </div>
</div>

<!-- Login -->
<div class="login-section">
    <div class="login-box">
        <h2>Welcome Back!</h2>
        <input type="text" placeholder="Email">
        <input type="password" placeholder="Password">
        <button onclick="goDashboard()">Login</button>
    </div>
</div>

<script>
function goDashboard() {
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
