<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 15px 40px;
            border-bottom: 1px solid #ddd;
        }

        .hero {
            background: linear-gradient(to right, #2c3e50, #2ecc71);
            color: white;
            text-align: center;
            padding: 80px;
        }

        .hero button {
            padding: 10px 20px;
            background: #2ecc71;
            border: none;
            color: white;
        }
    </style>
</head>

<body>

<div class="navbar">
    <b>PrepMate</b>
</div>

<div class="hero">
    <h1>Welcome to PrepMate 🚀</h1>
    <p>Your Ultimate Interview Preparation Platform</p>
    <button>Start Chatting</button>
</div>

</body>
</html>
