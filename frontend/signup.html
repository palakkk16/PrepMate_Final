<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - PrepMate</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;

            background: linear-gradient(
                to bottom,
                rgba(2,6,23,0.9),
                rgba(2,6,23,0.95)
            ),
            url("https://images.unsplash.com/photo-1551836022-d5d88e9218df?q=80&w=1600") center/cover no-repeat;

            background-attachment: fixed;

            color: white;

            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* NAVBAR */
        .navbar {
            padding: 20px 60px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.02);
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #3b82f6;
            text-decoration: none;
        }

        .logo:hover {
            opacity: 0.8;
        }

        /* CENTER CONTENT */
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            width: 360px;
            padding: 40px;
            background: rgba(17, 24, 39, 0.9);
            border-radius: 10px;
        }

        h2 {
            margin-bottom: 10px;
        }

        p {
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
            background: #1f2937;
            color: white;
            font-size: 14px;
        }

        input:focus {
            outline: 1px solid #3b82f6;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            background: #3b82f6;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        .bottom-text {
            margin-top: 20px;
            color: #9ca3af;
            font-size: 14px;
        }

        .bottom-text a {
            color: white;
            text-decoration: none;
        }

        .bottom-text a:hover {
            text-decoration: underline;
        }

        /* FOOTER */
        .footer {
            text-align: center;
            padding: 20px;
            color: #6b7280;
            font-size: 13px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="index.html" class="logo">PrepMate</a>
</div>

<!-- SIGNUP FORM -->
<div class="container">
    <div class="box">

        <h2>Create Account</h2>
        <p>Start your interview preparation</p>

        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Password">
        <input type="password" id="confirm" placeholder="Confirm Password">

        <button onclick="signup()">Sign Up</button>

        <div class="bottom-text">
            Already have an account? <a href="login.html">Login</a>
        </div>

    </div>
</div>

<!-- FOOTER -->
<div class="footer">
    © 2026 PrepMate • Built for smarter interview preparation 🚀
</div>

<script>
function signup() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;
    let confirm = document.getElementById("confirm").value;

    if (!email || !password || !confirm) {
        alert("Fill all fields");
        return;
    }

    if (password !== confirm) {
        alert("Passwords do not match");
        return;
    }

    localStorage.setItem("user", JSON.stringify({ email, password }));

    alert("Signup successful!");
    window.location.href = "login.html";
}
</script>

</body>
</html>
