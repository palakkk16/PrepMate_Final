<!DOCTYPE html>
<html>
<head>
    <title>GD Prep - PrepMate</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #020617;
            color: white;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #3b82f6;
            text-decoration: none;
        }

        /* HERO */
        .hero {
            text-align: center;
            padding: 80px 60px 50px;
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .hero p {
            color: #9ca3af;
        }

        /* SECTION */
        .topics-section {
            padding: 20px 60px 60px;
        }

        .section-title {
            font-size: 1.8rem;
            margin-bottom: 30px;
        }

        /* GRID */
        .gd-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        /* CARD */
        .gd-card {
            background: #111827;
            border-radius: 12px;
            overflow: hidden;
            transition: 0.3s;
        }

        .gd-card:hover {
            transform: translateY(-5px);
            background: #1f2937;
        }

        /* HEADER */
        .gd-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .gd-topic {
            font-size: 18px;
            font-weight: bold;
        }

        .gd-type {
            font-size: 13px;
            color: #9ca3af;
        }

        /* CONTENT */
        .gd-content {
            display: none;        /* 🔥 ensures hidden */
            padding: 20px;
        }

        .opening-line {
            background: #020617;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 3px solid #3b82f6;
        }

        .key-points h4 {
            margin-bottom: 10px;
        }

        .point {
            background: #020617;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            border-left: 3px solid #3b82f6;
        }

        .closing-line {
            background: #020617;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            border-left: 3px solid #3b82f6;
        }

        /* BUTTON */
        .practice-btn {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            margin-top: 15px;
        }

        .practice-btn:hover {
            background: #2563eb;
        }

        .gd-content {
            transition: all 0.3s ease;
        }

        .dropdown {
            padding: 12px;
            background: #020617;
            margin-top: 10px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }

        .dropdown:hover {
            background: #1f2937;
        }

        .dropdown-content {
            display: none;
            padding: 10px;
            margin-top: 5px;
            background: #111827;
            border-radius: 6px;
        }

        .point {
            padding: 8px;
            margin-bottom: 5px;
            background: #020617;
            border-radius: 6px;
        }

    </style>
</head>
<body>
    <!-- Navbar -->
    <div class="navbar">
        <a href="index.html" class="logo">PrepMate</a>
        <a href="dashboard.html" style="color: var(--dark); text-decoration: none;">
            <i class="fas fa-home"></i> Dashboard
        </a>
    </div>

    <!-- Hero -->
    <div class="hero">
        <h1><i class="fas fa-microphone"></i> Group Discussion Mastery</h1>
        <p>200+ Topics • Opening Lines • Key Arguments • Winning Strategies</p>
    </div>

    <!-- Topics -->
    <div class="topics-section">
        <h2 class="section-title"> Popular GD Topics</h2>
        <div class="gd-grid" id="gdGrid"></div>
    </div>

    <script>
            const gdTopics = [
            {
                topic: "Work From Home: A New Normal?",
                type: "Social Issue",
                opening: "WFH is changing modern work culture...",
                points: [
                    "Higher productivity",
                    "Better work-life balance",
                    "Cost savings",
                    "Isolation issues",
                    "Security concerns"
                ],
                closing: "WFH will lead to hybrid work models."
            },
            {
                topic: "Social Media: Bane or Boon?",
                type: "Technology",
                opening: "Social media connects billions worldwide...",
                points: [
                    "Global connectivity",
                    "Business growth",
                    "Fake news issue",
                    "Mental health impact"
                ],
                closing: "Responsible use defines its impact."
            },
            {
                topic: "India’s Economy Growth",
                type: "Economy",
                opening: "India is rapidly growing economically...",
                points: [
                    "Digital growth",
                    "Manufacturing push",
                    "Job challenges"
                ],
                closing: "Sustainable growth is key."
            }
        ];

        window.onload = function () {
            renderGDTopics();
        };

        function renderGDTopics() {
            const grid = document.getElementById("gdGrid");
            grid.innerHTML = "";

            gdTopics.forEach((topic, index) => {
                const card = document.createElement("div");
                card.className = "gd-card";

                card.innerHTML = `
                    <div class="gd-header" onclick="toggleGD(${index})">
                        <div class="gd-topic">${topic.topic}</div>
                        <div class="gd-type">${topic.type}</div>
                    </div>

                    <div class="gd-content" id="gd-${index}" style="display:none;">

                        <div class="dropdown" onclick="toggleSection(event, 'open-${index}')">
                            <span>Opening Statement</span>
                            <span id="arrow-open-${index}">▼</span>
                        </div>
                        <div class="dropdown-content" id="open-${index}" style="display:none;">
                            ${topic.opening}
                        </div>

                        <div class="dropdown" onclick="toggleSection(event, 'points-${index}')">
                            <span>Key Points</span>
                            <span id="arrow-points-${index}">▼</span>
                        </div>
                        <div class="dropdown-content" id="points-${index}" style="display:none;">
                            ${topic.points.map(p => `<div class="point">${p}</div>`).join("")}
                        </div>

                        <div class="dropdown" onclick="toggleSection(event, 'close-${index}')">
                            <span>Closing Statement</span>
                            <span id="arrow-close-${index}">▼</span>
                        </div>
                        <div class="dropdown-content" id="close-${index}" style="display:none;">
                            ${topic.closing}
                        </div>

                    </div>
                `;

                grid.appendChild(card);
            });
        }

        /* 🔥 ONLY ONE CARD OPENS */
        function toggleGD(index) {
            document.querySelectorAll(".gd-content").forEach((el, i) => {
                if (i !== index) {
                    el.style.display = "none";
                }
            });

            const current = document.getElementById(`gd-${index}`);

            if (current.style.display === "block") {
                current.style.display = "none";
            } else {
                current.style.display = "block";
            }
        }

        /* 🔥 DROPDOWN INSIDE CARD */
        function toggleSection(event, id) {
            event.stopPropagation();

            const content = document.getElementById(id);
            const arrow = document.getElementById("arrow-" + id);

            if (content.style.display === "block") {
                content.style.display = "none";
                arrow.innerText = "▼";
            } else {
                content.style.display = "block";
                arrow.innerText = "▲";
            }
        }
    </script>
</body>
</html>
